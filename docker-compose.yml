version: "3.9"

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nfl_tracker
      POSTGRES_USER: nfl
      POSTGRES_PASSWORD: nflpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nfl -d nfl_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_APP: run.py
      DATABASE_URL: postgresql://nfl:nflpassword@db:5432/nfl_tracker
      REDIS_URL: redis://redis:6379/0
      UPLOAD_FOLDER: /app/uploads
      LOG_DIR: /app/logs
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - .:/app  # live reload in dev — remove in prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    profiles:
      - production
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app_network
