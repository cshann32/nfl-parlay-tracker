version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Production compose file — run with:
#   docker-compose up --build -d
#
# For local development use the override:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# ─────────────────────────────────────────────────────────────────────────────

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nfl_tracker
      POSTGRES_USER: nfl
      POSTGRES_PASSWORD: nflpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Seed script: only runs on a fresh (empty) volume.
      # Includes all tables + data so the app starts pre-populated.
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nfl -d nfl_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (sessions + cache) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Flask app (Gunicorn) ────────────────────────────────────────────────────
  app:
    build: .
    image: bigg313rd/nfl-parlay-tracker:latest
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_APP: run.py
      FLASK_ENV: production
      DATABASE_URL: postgresql://nfl:nflpassword@db:5432/nfl_tracker
      REDIS_URL: redis://redis:6379/0
      UPLOAD_FOLDER: /app/uploads
      LOG_DIR: /app/logs
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network
    # Not exposed directly — Nginx handles all public traffic

  # ── Nginx reverse proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/app/uploads:ro
    depends_on:
      - app
    networks:
      - app_network
