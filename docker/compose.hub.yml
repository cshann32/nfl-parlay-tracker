version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Pull-and-run compose — no source code or build required.
#
#   1. Copy this file + .env.example to any machine that has Docker
#   2. cp .env.example .env  (set SECRET_KEY)
#   3. docker-compose -f docker/compose.hub.yml up -d
#
# The app image is pulled from Docker Hub: bigg313rd/nfl-parlay-tracker
# Postgres is pre-seeded with data on first start.
# ─────────────────────────────────────────────────────────────────────────────

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nfl_tracker
      POSTGRES_USER: nfl
      POSTGRES_PASSWORD: nflpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nfl -d nfl_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    image: bigg313rd/nfl-parlay-tracker:latest
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_APP: run.py
      FLASK_ENV: production
      DATABASE_URL: postgresql://nfl:nflpassword@db:5432/nfl_tracker
      REDIS_URL: redis://redis:6379/0
      UPLOAD_FOLDER: /app/uploads
      LOG_DIR: /app/logs
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/app/uploads:ro
    depends_on:
      - app
    networks:
      - app_network
